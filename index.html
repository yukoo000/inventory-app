<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>棚卸スキャン</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
margin:10px;
background-color: #fafdff; /* 水色 */
color:#626063;
}

input{
font-size:20px;
margin:5px;
width:70%;
background-color: #ffffff; /* 白 */
border: 0.5px solid #abced8;
color: #626063;
}

button{
font-size:18px;
padding:8px;
margin:5px;
background-color: #eaf4fc; /* 白藍 */
border: 0.5px solid #abced8;
border-radius: 5px;   
color: #626063;
}

input:focus,
button:focus {
  outline: 1.5px solid #debecc; /* ピンクの枠 */
  outline-offset: 1.5px;        /* 枠と要素の間隔 */
}

#camera-container{
position:relative;
width:100vw;
max-width:400px;
height:calc(100vw * 9 / 16);
margin:auto;
overflow:hidden;
}

#camera{
width:100vw;
height:100%;
object-fit:cover;
}

#scan-area{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:260px;
height:80px;
border:3px solid red;
pointer-events:none;
}

</style>

</head>

<body>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<div id="staffEntry">

<h2>担当ID入力</h2>

<input id="staffInput" placeholder="担当ID"><br>

<button onclick="startApp()">開始</button>

</div>

<div id="app" style="display:none">

<h2>棚卸スキャン</h2>

担当: <span id="staffDisplay"></span><br>

<button onclick="enableKeyboard('product')">品番手入力</button>
<button onclick="enableKeyboard('qty')">数量手入力</button><br>

品番<br>

<input id="product" readonly placeholder="品番"
onblur="disableKeyboard('product')"><br>

数量<br>

<input id="qty" readonly inputmode="numeric"
placeholder="数量"
onblur="disableKeyboard('qty')"><br>

<button onclick="saveData()">OK</button>
<button onclick="clearInput()">NG</button><br>

<button onclick="clearProduct()">品番削除</button>
<button onclick="clearQty()">数量削除</button><br>

<button onclick="sendBuffer()">データの送信</button>
<button onclick="restartCamera()">カメラ再起動</button>

<br><br>

未送信件数: <span id="bufferCount">0</span>件

<br><br>

<div id="camera-container">

<video id="camera" autoplay></video>

<div id="scan-area"></div>

</div>

<p id="msg"></p>

</div>

<script>

let staffID='';
let step=0;
let lock=false;
let codeReader;
let lastScanTime=0;

// GAS URL
const GAS_URL="https://script.google.com/macros/s/AKfycbwT67wBt95_UMkiClCDVivSh6p6StfjamTCfDKB5oXADMbBHLxcJVSrjuu6gYDX1bjJ/exec";

// ローカル保存バッファ
let buffer = JSON.parse(localStorage.getItem("scanBuffer") || "[]");

updateBufferDisplay();

function updateBufferDisplay(){
document.getElementById("bufferCount").innerText = buffer.length;
}

// ---------------- 開始 ----------------

function startApp(){

const id=document.getElementById("staffInput").value.trim();

if(!id){
alert("担当IDを入力してください");
return;
}

staffID=id;

document.getElementById("staffDisplay").innerText=id;

document.getElementById("staffEntry").style.display="none";
document.getElementById("app").style.display="block";

startScanner();

}

// ---------------- キーボード ----------------

function enableKeyboard(id){

const el=document.getElementById(id);

el.readOnly=false;

el.focus();

}

function disableKeyboard(id){

document.getElementById(id).readOnly=true;

}

// ---------------- スキャナー ----------------

function startScanner(){

const hints = new Map();

hints.set(
ZXing.DecodeHintType.POSSIBLE_FORMATS,
[ZXing.BarcodeFormat.CODE_39]
);

codeReader = new ZXing.BrowserMultiFormatReader(hints);

const video = document.getElementById("camera");

codeReader.decodeFromVideoDevice(
null,
video,
(result,err)=>{

if(result){

const now = Date.now();

if(now - lastScanTime < 500) return;

lastScanTime = now;

if(lock) return;

lock=true;

const text=result.getText();

document.getElementById("beep").play();

if(step===0){

document.getElementById("product").value=text;

step=1;

}else{

document.getElementById("qty").value=text;

step=0;

}

setTimeout(()=>{
lock=false;
},500);

}

}
);

}

// ---------------- カメラ再起動 ----------------

function restartCamera(){

if(codeReader){
codeReader.reset();
}

startScanner();

}

// ---------------- 保存（OKボタン） ----------------

function saveData(){

const product=document.getElementById("product").value;
const qty=document.getElementById("qty").value;

if(!product || !qty){
alert("品番と数量を入力");
return;
}

buffer.push({
staff:staffID,
product:product,
qty:qty,
time:Date.now()
});

localStorage.setItem("scanBuffer", JSON.stringify(buffer));

updateBufferDisplay();

document.getElementById("msg").innerText="保存しました";

clearInput();

// 50件で自動送信
if(buffer.length>=50){
sendBuffer();
}

}

// ---------------- まとめて送信 ----------------

function sendBuffer(){

if(buffer.length===0){

document.getElementById("msg").innerText="送信データなし";

return;

}

fetch(GAS_URL,{

method:'POST',

mode:'cors',

headers:{
'Content-Type':'text/plain'
},

body:JSON.stringify({
data:buffer
})

})

.then(res=>res.json())

.then(data=>{

if(data.status==="ok"){

buffer=[];

localStorage.removeItem("scanBuffer");

updateBufferDisplay();

document.getElementById("msg").innerText="送信成功";

}else{

document.getElementById("msg").innerText="送信失敗";

}

})

.catch(err=>{

alert("通信エラー");

console.error(err);

});

}

// ---------------- 5分自動送信 ----------------

setInterval(()=>{

if(buffer.length>0){

sendBuffer();

}

},300000);

// ---------------- 入力クリア ----------------

function clearInput(){

document.getElementById("product").value="";
document.getElementById("qty").value="";

step=0;

}


// -------------- 品番or数量クリア --------------

function clearProduct(){

document.getElementById("product").value="";

step=0;

}

function clearQty(){

document.getElementById("qty").value="";

step=1;

}


</script>

</body>

</html>
