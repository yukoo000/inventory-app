<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>棚卸スキャン（GitHub Pages対応）</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{font-family:sans-serif;text-align:center;margin:10px;}
input{font-size:20px;margin:5px;width:80%;}
button{font-size:18px;padding:8px;margin:5px;}
#camera-container{position:relative;width:100vw;max-width:400px;margin:auto;overflow:hidden;height:calc(100vw*9/16);background:black;}
#camera{width:100%;height:100%;object-fit:cover;}
#scan-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:80px;border:3px solid red;pointer-events:none;}
</style>
</head>

<body>
<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<div id="staffEntry">
  <h2>担当ID入力</h2>
  <input id="staffInput" placeholder="担当ID"><br>
  <button onclick="startApp()">開始</button>
</div>

<div id="app" style="display:none">
  <h2>棚卸スキャン</h2>
  担当: <span id="staffDisplay"></span><br>
  <button onclick="enableKeyboard('product')">品番手入力</button>
  <button onclick="enableKeyboard('qty')">数量手入力</button><br>
  品番<br>
  <input id="product" readonly placeholder="品番" onblur="disableKeyboard('product')"><br>
  数量<br>
  <input id="qty" readonly inputmode="numeric" placeholder="数量" onblur="disableKeyboard('qty')"><br>
  
  <button onclick="send()">OK（バッファ追加）</button>
  <button onclick="clearInput()">NG</button>
  <button onclick="restartCamera()">カメラ再起動</button>
  <button onclick="sendBuffered()">まとめて送信</button>
  
  <br><br>
  <div id="camera-container">
    <video id="camera" autoplay playsinline></video>
    <div id="scan-area"></div>
  </div>
  <p id="msg"></p>
</div>

<script>
let staffID='';
let step=0;
let lock=false;
let codeReader;
let lastScanTime=0;
let buffer=[];
const GAS_URL="https://script.google.com/macros/s/AKfycbwT67wBt95_UMkiClCDVivSh6p6StfjamTCfDKB5oXADMbBHLxcJVSrjuu6gYDX1bjJ/exec";

// タイマー設定
let autoSendTimer=null;
const AUTO_SEND_INTERVAL=30000; // 30秒

function startApp(){
  const id=document.getElementById("staffInput").value.trim();
  if(!id){ alert("担当IDを入力してください"); return; }
  staffID=id;
  document.getElementById("staffDisplay").innerText=id;
  document.getElementById("staffEntry").style.display="none";
  document.getElementById("app").style.display="block";
  startScanner();
}

function enableKeyboard(id){ document.getElementById(id).readOnly=false; document.getElementById(id).focus(); }
function disableKeyboard(id){ document.getElementById(id).readOnly=true; }

function startScanner(){
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.CODE_39]);
  codeReader = new ZXing.BrowserMultiFormatReader(hints);
  const video=document.getElementById("camera");

  codeReader.decodeFromVideoDevice(null,video,(result,err)=>{
    if(result){
      const now=Date.now();
      if(now-lastScanTime<1200) return;
      lastScanTime=now;
      if(lock) return;
      lock=true;
      const text=result.getText();
      document.getElementById("beep").play();

      if(result.resultPoints){
        let centerY=0;
        result.resultPoints.forEach(p=>centerY+=p.getY());
        centerY/=result.resultPoints.length;
        const rect=video.getBoundingClientRect();
        const guideTop=rect.height/2-40;
        const guideBottom=rect.height/2+40;
        if(centerY<guideTop || centerY>guideBottom){ lock=false; return; }
      }

      if(step===0){ document.getElementById("product").value=text; step=1; }
      else{ document.getElementById("qty").value=text; step=0; }

      setTimeout(()=>{lock=false;},500);
    }
  });
}

function restartCamera(){ if(codeReader){ codeReader.reset(); } startScanner(); }

function send(){
  const product=document.getElementById("product").value;
  const qty=document.getElementById("qty").value;
  if(!product || !qty){ alert("品番と数量を入力"); return; }

  buffer.push({staff: staffID, product: product, qty: qty});
  clearInput();
  document.getElementById("msg").innerText = buffer.length + "件バッファに追加";

  if(buffer.length >= 50){ sendBuffered(); }
  else{ resetAutoSendTimer(); }
}

function resetAutoSendTimer(){
  if(autoSendTimer) clearTimeout(autoSendTimer);
  autoSendTimer = setTimeout(()=>{
    if(buffer.length>0){
      sendBuffered();
    }
  }, AUTO_SEND_INTERVAL);
}

function sendBuffered(){
  if(buffer.length === 0) return;

  fetch(GAS_URL,{
    method:'POST',
    mode:'cors',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(buffer)
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="ok"){
      document.getElementById("msg").innerText = buffer.length + "件まとめて保存しました";
      buffer=[];
    } else{
      document.getElementById("msg").innerText = "送信失敗";
    }
  })
  .catch(err=>{
    alert("通信エラー");
    console.error(err);
  });
}

function clearInput(){
  document.getElementById("product").value="";
  document.getElementById("qty").value="";
  step=0;
}
</script>
</body>
</html>
