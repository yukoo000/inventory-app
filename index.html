<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>棚卸アプリ（試作）</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:sans-serif;text-align:center;margin:10px;}
input{font-size:20px;margin:5px;width:80%;}
button{font-size:18px;padding:8px;margin:5px;}
#camera-container{position:relative;width:100%;max-width:400px;margin:auto;}
#camera{width:100%;height:220px;margin:10px auto;overflow:hidden;position:relative;background:black;}
#barcode-guide{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);
  width:90%;height:80px;border:2px dashed red;pointer-events:none;box-sizing:border-box;z-index:2;}
.overlay{position:absolute;left:0;width:100%;background:rgba(0,0,0,0.4);z-index:1;}
#overlay-top{}
#overlay-bottom{}
</style>
</head>
<body>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<!-- 担当ID入力 -->
<div id="staffEntry">
<h2>担当ID入力</h2>
<input id="staffInput" placeholder="担当ID"><br>
<button onclick="startApp()">開始</button>
</div>

<!-- アプリ画面 -->
<div id="app" style="display:none">
<h2>棚卸スキャン</h2>
担当: <span id="staffDisplay"></span><br>

<!-- 手動入力ボタン -->
<button onclick="enableKeyboard('product')">品番手入力</button>
<button onclick="enableKeyboard('qty')">数量手入力</button><br>

品番<br>
<input id="product" readonly placeholder="品番" onblur="disableKeyboard('product')"><br>

数量<br>
<input id="qty" readonly inputmode="numeric" placeholder="数量" onblur="disableKeyboard('qty')"><br>

<button onclick="send()">OK</button>
<button onclick="clearInput()">NG</button>

<!-- カメラとガイド枠 + オーバーレイ -->
<div id="camera-container">
  <div id="camera"></div>
  <div id="overlay-top" class="overlay"></div>
  <div id="overlay-bottom" class="overlay"></div>
  <div id="barcode-guide"></div>
</div>

<p id="msg"></p>
</div>

<script>
let staffID='';
let step=0;
let lock=false;
let scanner;

// ★あなたのGAS URL
const GAS_URL="https://script.google.com/macros/s/AKfycbwT67wBt95_UMkiClCDVivSh6p6StfjamTCfDKB5oXADMbBHLxcJVSrjuu6gYDX1bjJ/exec";

// -------------------- 担当ID入力後開始 --------------------
function startApp(){
  const id=document.getElementById("staffInput").value.trim();
  if(!id){ alert("担当IDを入力してください"); return; }

  staffID = id;
  document.getElementById("staffDisplay").innerText = staffID;

  document.getElementById("staffEntry").style.display="none";
  document.getElementById("app").style.display="block";

  setOverlay(); // オーバーレイ位置調整
  startScanner();
}

// -------------------- オーバーレイ調整 --------------------
function setOverlay(){
  const guide = document.getElementById('barcode-guide');
  const camera = document.getElementById('camera');
  const overlayTop = document.getElementById('overlay-top');
  const overlayBottom = document.getElementById('overlay-bottom');

  const guideRect = guide.getBoundingClientRect();
  const cameraRect = camera.getBoundingClientRect();

  const topHeight = guideRect.top - cameraRect.top;
  const bottomHeight = cameraRect.bottom - guideRect.bottom;

  overlayTop.style.top = '0px';
  overlayTop.style.height = topHeight + 'px';

  overlayBottom.style.bottom = '0px';
  overlayBottom.style.height = bottomHeight + 'px';
}

// -------------------- キーボード制御 --------------------
function enableKeyboard(inputId){
  const el = document.getElementById(inputId);
  el.readOnly = false; // キーボードを出せるようにする
  el.focus();          // 自動でフォーカスしてキーボード表示
}

function disableKeyboard(inputId){
  const el = document.getElementById(inputId);
  el.readOnly = true; // フォーカスが外れたら再び読み取りメイン
}

// -------------------- バーコードスキャナー --------------------
function startScanner(){
  scanner = new Html5Qrcode("camera");

  Html5Qrcode.getCameras().then(devices=>{
    if(devices && devices.length){

      scanner.start(
        { facingMode:"environment" },
        {
          fps:10,
          qrbox:false,
          formatsToSupport:[
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8
          ]
        },
        (decodedText, decodedResult)=>{
          if(lock) return;
          if(!decodedResult || !decodedResult.resultPoints) return;

          const points = decodedResult.resultPoints;
          const ySum = points.reduce((acc,p)=>acc+p.y,0)/points.length;

          const guide = document.getElementById('barcode-guide');
          const guideRect = guide.getBoundingClientRect();
          const cameraRect = document.getElementById('camera').getBoundingClientRect();
          const guideTop = guideRect.top - cameraRect.top;
          const guideBottom = guideRect.bottom - cameraRect.top;
          const margin = 10;

          if(ySum < guideTop - margin || ySum > guideBottom + margin) return;

          lock = true;
          document.getElementById("beep").play();

          if(step===0){
            document.getElementById("product").value=decodedText;
            step=1;
          }else{
            document.getElementById("qty").value=decodedText;
            step=0;
          }

          setTimeout(()=>{lock=false;},1000);
        }
      );

    }else{
      alert("カメラが見つかりません");
    }
  }).catch(err=>alert("カメラ起動エラー: "+err));
}

// -------------------- データ送信 --------------------
function send(){
  const product=document.getElementById("product").value;
  const qty=document.getElementById("qty").value;
  if(!product || !qty){ alert("品番と数量を入力"); return; }

  fetch(GAS_URL,{
    method:'POST',
    mode:'cors',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({staff:staffID, product:product, qty:qty})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="ok"){
      document.getElementById("msg").innerText="保存しました";
      clearInput();
    }else{
      document.getElementById("msg").innerText="保存失敗";
    }
  })
  .catch(err=>{
    alert("通信エラー");
    console.error(err);
  });
}

// -------------------- 入力クリア --------------------
function clearInput(){
  document.getElementById("product").value="";
  document.getElementById("qty").value="";
  step=0;
  document.getElementById("msg").innerText="入力クリア";
}
</script>

</body>
</html>
